<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiDex - {{ outro_usuario.nome }}</title>
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --text-main: #f1f5f9; --text-dim: #94a3b8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .navbar { width: 100%; background-color: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 12px 0; display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .logo-nav { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }

        .chat-container { width: 100%; max-width: 550px; flex-grow: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; height: calc(100vh - 140px); }
        
        /* Cabeçalho do Chat dentro do balão */
        .chat-header { display: flex; align-items: center; gap: 12px; padding: 15px; border-bottom: 1px solid #334155; background: rgba(30, 41, 59, 0.5); }
        .back-btn { color: var(--text-dim); text-decoration: none; font-size: 20px; }

        .messages-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bolhas de Mensagem */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--accent); color: #0f172a; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 4px; }

        .input-area { padding: 15px; border-top: 1px solid #334155; display: flex; gap: 10px; background: rgba(30, 41, 59, 0.5); }
        .chat-input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #0f172a; font-size: 20px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo-nav">DiDex</a>
    </nav>

    <div class="chat-container">
        <div style="background: var(--card-bg); border-radius: 16px; border: 1px solid #334155; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            
            <div class="chat-header">
                <a href="{{ url_for('chat_lista') }}" class="back-btn"><i class="ph-bold ph-caret-left"></i></a>
                <div class="avatar" style="width: 35px; height: 35px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">
                    {% if outro_usuario.foto_perfil and outro_usuario.foto_perfil != 'default_avatar.png' %}
                        <img src="{{ url_for('static', filename='profile_pics/' + outro_usuario.foto_perfil) }}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                    {% else %}
                        {{ outro_usuario.nome[0].upper() }}
                    {% endif %}
                </div>
                <span style="font-weight: bold;">{{ outro_usuario.nome }}</span>
            </div>

            <div class="messages-box" id="chatBox">
                {% for msg in mensagens %}
                    <div class="msg {% if msg.remetente_id == current_user.id %}sent{% else %}received{% endif %}">
                        {{ msg.conteudo }}
                    </div>
                {% endfor %}
            </div>

            <form class="input-area" action="{{ url_for('enviar_mensagem', usuario_id=outro_usuario.id) }}" method="POST">
                <input type="text" name="conteudo" class="chat-input" placeholder="Digite uma mensagem..." autocomplete="off" required>
                <button type="submit" class="send-btn"><i class="ph-fill ph-paper-plane-right"></i></button>
            </form>
        </div>
    </div>

    <script>
        // Faz o chat começar sempre no final das mensagens
        var chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>
    <script>
    // Foca no campo de texto assim que abre a conversa
    document.querySelector('.chat-input').focus();

    // Mantém o scroll sempre embaixo ao carregar
    const chatBox = document.getElementById("chatBox");
    chatBox.scrollTop = chatBox.scrollHeight;
    function carregarNovasMensagens() {
    // Essa função recarrega apenas a parte das mensagens
    // Para um chat 100% profissional usaríamos WebSockets, mas para o DiDex agora,
    // podemos fazer um "refresh" suave na div de mensagens ou usar:
    location.reload(); 
    // Nota: O location.reload() é o jeito simples. 
    // Se quiser algo que não pisque nadinha, me avise que montamos o fetch de mensagens!
}

// Se o usuário estiver inativo, ele checa a cada 3 segundos
// setInterval(carregarNovasMensagens, 3000);
</script>
</body>
</html>
