<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DiDex</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: #1e293b; 
            --accent: #38bdf8; 
            --text-dim: #64748b; 
        }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .logo-text {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4));
            letter-spacing: -2px;
        }

        .input-container {
            position: relative;
            width: 100%;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #1e293b;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px #38bdf8;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 20px;
            z-index: 10;
        }

        .btn-entrar {
            width: 100%;
            padding: 16px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-entrar:hover {
            background-color: #7dd3fc;
            transform: scale(1.02);
        }

        .link-cadastro {
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
        }

        .link-cadastro a {
            color: #38bdf8;
            text-decoration: none;
        }

        #erro-login {
            color: #ff4d4d;
            font-size: 14px;
            display: none;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* CSS DO LOADER */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(56, 189, 248, 0.1);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loader-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <div class="spinner"></div>
        <p style="color: var(--accent); margin-top: 15px; font-weight: 600; font-family: 'Inter', sans-serif;">Validando acesso...</p>
    </div>

    <div class="login-box">
        <div class="logo-text">DiDex</div>
        
        <div id="erro-login">⚠️ Usuário ou senha incorretos.</div>

        <form id="formLogin">
            <div class="input-container">
                <input type="text" id="usuario_login" oninput="limparErro(this)" placeholder="Nome de usuário ou e-mail">
            </div>

            <div class="input-container">
                <input type="password" id="senha_login" oninput="limparErro(this)" placeholder="Senha">
                <i class="ph ph-eye-slash eye-icon" id="toggleLogin"></i>
            </div>

            <button type="button" onclick="fazerLogin()" class="btn-entrar" id="btn-entrar">Entrar</button>
        </form>

        <p class="link-cadastro">
            Não tem conta? <a href="/cadastro">Cadastre-se</a>
        </p>
    </div>

    <script>
        // Lógica do Olhinho
        const toggleLogin = document.getElementById('toggleLogin');
        const senhaLogin = document.getElementById('senha_login');

        toggleLogin.addEventListener('click', function() {
            const type = senhaLogin.type === 'password' ? 'text' : 'password';
            senhaLogin.type = type;
            this.classList.toggle('ph-eye');
            this.classList.toggle('ph-eye-slash');
        });

        // Função de Login com Loader
        async function fazerLogin() {
            const user = document.getElementById('usuario_login').value;
            const pass = document.getElementById('senha_login').value;
            const erroDiv = document.getElementById('erro-login');
            const loader = document.getElementById('loader-overlay');
            const btn = document.getElementById('btn-entrar');

            // Mostrar loader
            loader.style.display = 'flex';
            btn.classList.add('btn-loading');

            const dados = new URLSearchParams();
            dados.append('email_usuario', user);
            dados.append('senha', pass);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: dados
                });

                const data = await response.json();

                if (response.ok && data.status === 'sucesso') {
                    window.location.href = '/home';
                } else {
                    // Esconder loader se der erro
                    loader.style.display = 'none';
                    btn.classList.remove('btn-loading');
                    
                    erroDiv.style.display = 'block';
                    document.getElementById('usuario_login').style.borderColor = '#ff4d4d';
                    document.getElementById('senha_login').style.borderColor = '#ff4d4d';
                    document.getElementById('usuario_login').style.boxShadow = '0 0 5px rgba(255, 77, 77, 0.5)';
                    document.getElementById('senha_login').style.boxShadow = '0 0 5px rgba(255, 77, 77, 0.5)';
                }
            } catch (err) {
                loader.style.display = 'none';
                btn.classList.remove('btn-loading');
                console.error("Erro no JS: ", err);
            }
        }

        function limparErro(input) {
            input.style.borderColor = '#1e293b';
            input.style.boxShadow = 'none';
            document.getElementById('erro-login').style.display = 'none';
        }
    </script>

</body>
</html>
