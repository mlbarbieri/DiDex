<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificar E-mail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  

<input type="hidden" name="codigo" id="codigo_completo">

        <h1>Verifique seu e-mail</h1>
        <p>Enviamos um código de 6 dígitos para o e-mail: <strong>{{ email }}</strong></p>
   <div style="display: flex; justify-content: center; gap: 10px; max-width: 450px; margin: 30px auto;">
    <input type="text" maxlength="1" class="code-input">
    <input type="text" maxlength="1" class="code-input">
    <input type="text" maxlength="1" class="code-input">
    <input type="text" maxlength="1" class="code-input">
    <input type="text" maxlength="1" class="code-input">
    <input type="text" maxlength="1" class="code-input">
</div>
<div class="code-container">
    </div>

<div id="erro-mensagem" style="display: none; color: #ff4d4d; margin-top: 10px; margin-bottom: 25px; font-weight: bold;">
    <span style="margin-right: 5px;">⚠️</span> O código está incorreto.
</div>

<input type="hidden" name="codigo" id="codigo_completo">
<button type="button" onclick="verificarCodigo()" 
        style="width: 200px; padding: 14px; background-color: #38bdf8; color: #0f172a; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px;">
    Verificar Código
</button>
        
        <form method="POST">
            <input type="hidden" name="codigo" id="codigo_completo">
            
        </form>
    </div>
    <script>
    const inputs = document.querySelectorAll('.code-input');
    const hiddenInput = document.getElementById('codigo_completo');

    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            atualizarCodigo();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    function atualizarCodigo() {
        let codigo = "";
        inputs.forEach(input => codigo += input.value);
        hiddenInput.value = codigo;
    }
    </script>
 <script>
    // Função para juntar os números dos quadradinhos
    function atualizarCodigo() {
        let codigo = "";
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach(input => {
            codigo += input.value;
        });
        document.getElementById('codigo_completo').value = codigo;
        return codigo;
    }

    // A função principal do botão
    async function verificarCodigo() {
        const codigo = atualizarCodigo(); // Junta os números antes de enviar
        
        if (codigo.length < 6) {
            alert("Por favor, digite os 6 dígitos.");
            return;
        }

        const inputs = document.querySelectorAll('.code-input');
        const erroDiv = document.getElementById('erro-mensagem');

        try {
            const response = await fetch('/verificar_email_api', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `codigo=${codigo}&email={{ email }}`
            });

            const result = await response.json();

            if (result.status === 'sucesso') {
                window.location.href = '/home'; 
            } else {
                inputs.forEach(input => input.classList.add('error'));
                if(erroDiv) erroDiv.style.display = 'block';
            }
        } catch (e) {
            console.error("Erro na chamada:", e);
            alert("Erro ao conectar com o servidor.");
        }
    }

    // Movimentação automática entre os campos
    document.querySelectorAll('.code-input').forEach((input, index, inputs) => {
        input.addEventListener('input', () => {
            if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            atualizarCodigo();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
        });
    });
</script>
</body>
</html>
</body>
</html>
