<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados para "{{ termo }}" - DiDex</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-nav {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        .search-info {
            margin-bottom: 20px;
            color: var(--text-dim);
            font-size: 14px;
        }

        .user-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }

        .user-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .name-box {
            display: flex;
            flex-direction: column;
        }

        .full-name { font-weight: 700; font-size: 16px; }
        .username { color: var(--accent); font-size: 13px; }

        .btn-perfil {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-perfil:hover {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .no-results {
            text-align: center;
            margin-top: 50px;
            color: var(--text-dim);
        }

        .no-results i { font-size: 50px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo-nav">DiDex</a>
    </nav>

    <div class="container">
        <div class="search-info">
            Resultados para: <strong>"{{ termo }}"</strong> ({{ usuarios|length }} encontrados)
        </div>

        {% if usuarios %}
            {% for usuario in usuarios %}
            <div class="user-card">
                <a href="{{ url_for('perfil', username=usuario.username) }}" class="user-info">
                    <img src="{{ url_for('static', filename='profile_pics/' + usuario.foto_perfil) }}" class="avatar">
                    <div class="name-box">
                        <span class="full-name">{{ usuario.nome }} {{ usuario.sobrenome }}</span>
                        <span class="username">@{{ usuario.username }}</span>
                    </div>
                </a>
                <a href="{{ url_for('perfil', username=usuario.username) }}" class="btn-perfil">Ver Perfil</a>
            </div>
            {% endfor %}
        {% else %}
            <div class="no-results">
                <i class="ph ph-users-four"></i>
                <p>Nenhum usuário encontrado com esse nome.</p>
                <a href="{{ url_for('home') }}" style="color: var(--accent); text-decoration: none; font-size: 14px;">Voltar para o feed</a>
            </div>
        {% endif %}
    </div>

</body>
</html>
